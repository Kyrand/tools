// ═══ JEWISH HUMOR ═══
{cat:J,text:"A Jewish man is shipwrecked on a desert island. Using materials he finds, he builds two synagogues. Years later, rescuers ask: 'Why two synagogues?' He points to one: 'That's the one I go to.' He points to the other: 'That's the one I wouldn't set foot in.'",featured:true,source:"Classic"},
{cat:J,text:"A group of five Jewish women are eating lunch at a café. Their waiter nervously approaches. 'Ladies,' he says, 'is anything okay?'",featured:true,source:"Traditional"},
{cat:J,text:"An elderly Jewish man faints and is rushed to hospital. A nurse tucks him in and says, 'Mr. Schwartzman, are you comfortable?' He replies, 'I make a living.'",source:"Classic"},
{cat:J,text:"A grandfather takes his grandchildren to the beach. A massive wave pulls the smallest boy out to sea. He prays desperately: 'God, please bring him back!' A bigger wave deposits the boy at his feet. He looks up at the sky: 'He had a hat.'",featured:true,source:"Traditional"},
{cat:J,text:"The census taker comes to the Goldman house. 'Does Louis Goldman live here?' 'No,' replies Goldman. 'What is your name?' 'Louis Goldman.' 'Didn't you just say Goldman doesn't live here?' Goldman sighs: 'You call this living?'",source:"Traditional"},
{cat:J,text:"Schwartz is sitting in his room wearing only a top hat. Steinberg walks in. 'Why are you sitting here naked?' 'It's all right. Nobody comes to visit.' 'But why the hat?' 'Maybe somebody will come.'",source:"Classic Yiddish"},
{cat:J,text:"Two old friends, Milt and Irv, go to Dodger games for fifty years. They make a pact: whoever gets to heaven first will tell the other if there's baseball. Milt dies. That night he appears in Irv's dream. 'Good news and bad news. Good news: there's baseball in heaven. Bad news: you're pitching Tuesday.'",featured:true,source:"Classic"},
{cat:J,text:"Cohen converts to Catholicism after months of study and is invited to address the congregation at Mass. He steps to the podium: 'Fellow Goyim…'",source:"Classic"},
{cat:J,text:"Maish and Benny walk by a church whose sign says anyone who converts gets $1,000. Maish goes in. When he returns, Benny asks, 'Did you get the thousand?' Maish shakes his head: 'Don't you people ever think of anything but money?'",source:"Traditional"},
{cat:J,text:"A Jewish curse: 'May all your teeth fall out — except one, so you can have a toothache.'",source:"Yiddish tradition"},
{cat:J,text:"Four Jewish ladies are having lunch in Miami. The first says, 'I'm a kleptomaniac, but I never stole from any of you.' The second: 'I'm a flirt, but I never flirted with your husbands.' The third: 'I'm a lesbian, but I never set my eye on any of you.' The fourth: 'I'm a gossip — I'd love to stay, but I gotta go make some calls.'",source:"Classic"},
{cat:J,text:"A priest and a rabbi are old friends who like to rib each other. The priest says, 'Too bad in your line of work there's no room for advancement. I could become a bishop, a cardinal, even the Pope.' The rabbi nods. 'And from there?' 'Well… theoretically, I could become God.' 'One of our boys made it.'",featured:true,source:"Traditional"},
{cat:J,text:"A woman on a train asks a man, 'Are you Jewish?' 'No.' She returns. 'Are you sure?' 'I'm sure.' A third time: 'Are you absolutely sure?' 'All right, I'm Jewish.' 'That's funny — you don't look Jewish.'",source:"Traditional"},
{cat:J,text:"A Jewish telegram: 'Start worrying. Details to follow.'",featured:true,source:"Classic Yiddish"},
{cat:J,text:"An old Jewish man is on his deathbed. He smells his favourite strudel wafting from the kitchen. With his last strength, he drags himself there and reaches for a piece. His wife slaps his hand: 'Leave it! It's for the funeral!'",source:"Traditional"},
{cat:J,text:"Two Jews are about to be shot. One turns to the firing squad commander and demands a blindfold. His friend nudges him: 'Shh, don't make trouble.'",featured:true,source:"Classic gallows humor"},
{cat:J,text:"Moishe walks into work looking terrible. His boss asks what happened. 'My wife told me she won't speak to me for thirty days.' 'That should make you happy!' 'It would — but today is the last day.'",source:"Traditional"},
{cat:J,text:"A rabbi, a priest, and a minister walk into a bar. The bartender looks up: 'What is this, a joke?'",source:"Classic meta-humor"},
{cat:J,text:"Three Jewish mothers are arguing about whose son loves her most. 'My son sends me flowers every week!' 'My son takes me to dinner every Friday!' The third smiles: 'My son goes to a psychiatrist five days a week — $200 an hour — and all he talks about is me.'",featured:true,source:"Classic"},
{cat:J,text:"Why don't Jewish mothers drink? It interferes with their suffering.",source:"Classic"},
{cat:J,text:"A man calls his mother in Florida. 'How are you, Mom?' 'Not good. I've been very weak.' 'Why?' 'Because I haven't eaten in 38 days.' 'Why haven't you eaten in 38 days?' 'Because I didn't want my mouth to be full in case you should call.'",source:"Traditional"},
{cat:J,text:"The Cohens had a good marriage for sixty years. Then one night, Sheila leaned over and slapped Ken. 'What was that for?' 'Sixty years of bad sex.' Ken thought, then slapped her back. 'That was for knowing the difference.'",source:"Classic"},
{cat:J,text:"Two beggars sit on a sidewalk in Rome — one with a cross, one with a Star of David. Everyone gives to the cross, nothing to the Star of David. A priest says, 'My friend, this is a Catholic city. Nobody will give you money with that.' As the priest walks away, the Star of David beggar turns to the other: 'Moishe, look who's trying to teach the Goldberg brothers about marketing.'",featured:true,source:"Classic"},
{cat:J,text:"An Italian, a Frenchman, and a Jew are sentenced to thirty years in prison. Each gets one request. The Italian asks for pasta. The Frenchman asks for wine. The Jew asks for a subscription to the Wall Street Journal. Thirty years later, the Italian comes out fat, the Frenchman stumbles out drunk. The Jew comes out and says, 'So, did they ever settle that thing in the Middle East?'",source:"Classic"},
{cat:J,text:"What's the difference between a Rottweiler and a Jewish mother? Eventually the Rottweiler lets go.",source:"Classic"},
{cat:J,text:"A Jewish businessman is dying. He confesses to his partner: 'Hymie, I robbed the firm of $200,000. I sold the secret formula. I also had an affair with your wife.' Hymie pats his hand: 'Relax. I'm the one who poisoned you.'",featured:true,source:"Classic dark"},
{cat:J,text:"Saul is working when he hears a booming voice from above: 'Saul, sell your business.' For weeks: 'Sell your business and go to Las Vegas.' He sells, goes to Vegas. 'Go to blackjack, put it all on one hand.' He bets everything, gets 18. Dealer shows 6. Voice says, 'Take a hit.' He gets a 4 — busted. Voice says, 'Unbelievable.'",featured:true,source:"Classic"},
{cat:J,text:"The optimist says the glass is half full. The pessimist says half empty. The Jewish mother says, 'Why didn't you drink it all? You don't like my lemonade?'",source:"Classic"},
{cat:J,text:"A rabbi is on his deathbed. 'Is my wife here?' 'Yes, darling.' 'My children?' 'Yes, Papa.' 'My grandchildren?' 'Yes, Zayde, we're all here.' He sits up: 'Then who's minding the store?!'",source:"Traditional"},
{cat:J,text:"Goldberg and Silverstein, both ninety, have been friends forever. Goldberg says, 'If one of us dies first, could the other come to the funeral?' Silverstein: 'Of course — I've got nothing else to do.'",source:"Classic"},
{cat:J,text:"Dear Dad — Univer$ity i$ great. Even though I'm making lot$ of friend$, I $till find time to $tudy. I $imply can't think of anything I need — Love, Your $on. ¶ Dear Son — I kNOw that astroNOmy, ecoNOmics and oceaNOgraphy are eNOugh to keep you busy. Do NOt forget that the pursuit of kNOwledge is a NOble task. — Love, Dad.",source:"Traditional"},
{cat:J,text:"'Doctor, I keep thinking I'm a moth.' 'You need a psychiatrist, not a dentist.' 'I know, but your light was on.'",source:"Classic"},
{cat:J,text:"An anti-Semite in a bar orders drinks for everyone except the Jewish man in the corner. The Jewish man smiles and says 'Thank you.' He does it again. Same response. The anti-Semite asks the bartender, 'What's wrong with that Jew?' The bartender says, 'Nothing — he owns the bar.'",featured:true,source:"Classic"},
{cat:J,text:"A man walks into a synagogue with a parrot on his shoulder. The rabbi asks, 'Where did you get that?' The parrot says, 'Brooklyn — there's hundreds of them.'",source:"Classic"},
{cat:J,text:"What's the definition of a Jewish dilemma? Free ham.",source:"Classic one-liner"},

// Application
// ═══════════════════════════════════════════

let allJokes = [...CURATED];
let filteredJokes = [...allJokes];
let activeCategory = 'All';
let showingFavourites = false;
let favourites = JSON.parse(localStorage.getItem('raconteur-favs') || '[]');

const $list = document.getElementById('jokeList');
const $search = document.getElementById('search');
const $cats = document.getElementById('categories');
const $randomBtn = document.getElementById('randomBtn');
const $favToggle = document.getElementById('favToggle');
const $toast = document.getElementById('toast');
const $endOrnament = document.getElementById('endOrnament');
const $jokeCount = document.getElementById('jokeCount');
const $apiSearchBtn = document.getElementById('apiSearchBtn');
let apiResults = []; // holds the latest online search results

const API_CAT_MAP = { Programming:C, Misc:C, Pun:W, Spooky:D, Christmas:X, Dark:D };

async function fetchAPIJokes(n = 10) {
  try {
    const r = await fetch(`https://v2.jokeapi.dev/joke/Any?amount=${n}&blacklistFlags=racist,sexist`);
    if (!r.ok) return [];
    const d = await r.json();
    return (d.jokes || [d]).filter(j => !j.error).map(j => ({
      cat: API_CAT_MAP[j.category] || C,
      text: j.type === 'twopart' ? `${j.setup}\n\n${j.delivery}` : j.joke,
      source: 'JokeAPI', apiId: j.id,
      setup: j.type === 'twopart' ? j.setup : null,
      delivery: j.type === 'twopart' ? j.delivery : null
    }));
  } catch { return []; }
}

async function loadAPIJokes() {
  const aj = await fetchAPIJokes(10);
  if (aj.length) { allJokes = [...CURATED, ...aj]; applyFilters(); }
}

async function searchAPIJokes(term) {
  if (!term || term.length < 2) return [];
  try {
    // Try text search first
    const url = `https://v2.jokeapi.dev/joke/Any?contains=${encodeURIComponent(term)}&amount=10&blacklistFlags=racist,sexist`;
    const r = await fetch(url);
    if (!r.ok) return [];
    const d = await r.json();
    if (!d.error) {
      const jokes = d.jokes || [d];
      return jokes.filter(j => !j.error).map(j => ({
        cat: API_CAT_MAP[j.category] || C,
        text: j.type === 'twopart' ? `${j.setup}\n\n${j.delivery}` : j.joke,
        source: 'JokeAPI', apiId: j.id, online: true,
        setup: j.type === 'twopart' ? j.setup : null,
        delivery: j.type === 'twopart' ? j.delivery : null
      }));
    }
    // Text search returned no results — try category match as fallback
    const catMap = {
      'programming':'Programming','code':'Programming','dev':'Programming','computer':'Programming',
      'dark':'Dark','death':'Dark','die':'Dark','dead':'Dark','kill':'Dark',
      'pun':'Pun','word':'Pun',
      'christmas':'Christmas','xmas':'Christmas','holiday':'Christmas',
      'spooky':'Spooky','halloween':'Spooky','ghost':'Spooky','scary':'Spooky'
    };
    const lower = term.toLowerCase();
    const matchedCat = Object.keys(catMap).find(k => lower.includes(k));
    if (matchedCat) {
      const catUrl = `https://v2.jokeapi.dev/joke/${catMap[matchedCat]}?amount=5&blacklistFlags=racist,sexist`;
      const cr = await fetch(catUrl);
      if (cr.ok) {
        const cd = await cr.json();
        if (!cd.error) {
          const jokes = cd.jokes || [cd];
          return jokes.filter(j => !j.error).map(j => ({
            cat: API_CAT_MAP[j.category] || C,
            text: j.type === 'twopart' ? `${j.setup}\n\n${j.delivery}` : j.joke,
            source: 'JokeAPI (category match)', apiId: j.id, online: true,
            setup: j.type === 'twopart' ? j.setup : null,
            delivery: j.type === 'twopart' ? j.delivery : null
          }));
        }
      }
    }
    return [];
  } catch { return []; }
}

const CAT_ORDER = [J,C,D,W,S,X];

function getCategories() {
  const cats = {};
  (showingFavourites ? getFavJokes() : allJokes).forEach(j => { cats[j.cat] = (cats[j.cat]||0)+1; });
  return cats;
}

function renderCategories() {
  const cats = getCategories();
  const total = Object.values(cats).reduce((a,b) => a+b, 0);
  let h = `<button class="cat-pill ${activeCategory==='All'?'active':''}" data-cat="All" role="tab">All <span class="count">${total}</span></button>`;
  CAT_ORDER.forEach(c => { if(cats[c]) h += `<button class="cat-pill ${activeCategory===c?'active':''}" data-cat="${c}" role="tab">${c} <span class="count">${cats[c]}</span></button>`; });
  $cats.innerHTML = h;
}

function jokeId(j) {
  return j.apiId ? `api-${j.apiId}` : btoa(unescape(encodeURIComponent(j.text.slice(0,80)))).replace(/[^a-zA-Z0-9]/g,'').slice(0,32);
}
function isFav(j) { return favourites.includes(jokeId(j)); }
function getFavJokes() { return allJokes.filter(j => isFav(j)); }

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderJokeCard(joke, i) {
  const id = jokeId(joke), faved = isFav(joke);
  const isTwoPart = joke.setup && joke.delivery;
  const textHtml = isTwoPart
    ? `<span class="setup">${escHtml(joke.setup)}</span><span class="delivery">${escHtml(joke.delivery)}</span>`
    : escHtml(joke.text).replace(/\n\n/g,'<br><br>').replace(/¶/g,'<br><br>');
  return `<article class="joke-card ${joke.featured?'featured':''}" style="animation-delay:${Math.min(i*0.03,0.6)}s" data-id="${id}">
    <div class="joke-meta"><span class="joke-category">${escHtml(joke.cat)}</span><span class="joke-source">${escHtml(joke.source||'')}${joke.online?'<span class="api-badge">online</span>':''}</span></div>
    <div class="joke-text">${textHtml}</div>
    <div class="joke-actions">
      <button class="joke-action-btn fav-btn ${faved?'faved':''}" data-id="${id}">${faved?'★ Saved':'☆ Save'}</button>
      <button class="joke-action-btn copy-btn" data-text="${escAttr(joke.setup?joke.setup+' — '+joke.delivery:joke.text)}">⎘ Copy</button>
    </div></article>`;
}

function renderJokes() {
  if (!filteredJokes.length && !apiResults.length) {
    $list.innerHTML = `<div class="status"><span class="emoji">${showingFavourites?'☆':'🎭'}</span>${showingFavourites?'No favourites yet. Save jokes you love!':'No jokes match your search. Try "Search Online" for more.'}</div>`;
    $endOrnament.style.display = 'none'; $jokeCount.textContent = ''; return;
  }
  let html = filteredJokes.map((j,i) => renderJokeCard(j,i)).join('');
  if (apiResults.length) {
    html += `<div class="api-divider">🌐 Results from JokeAPI</div>`;
    html += apiResults.map((j,i) => renderJokeCard(j, filteredJokes.length + i)).join('');
  }
  $list.innerHTML = html;
  $endOrnament.style.display = (filteredJokes.length + apiResults.length) > 3 ? 'block' : 'none';
  const total = filteredJokes.length + apiResults.length;
  const lbl = showingFavourites ? 'favourite' : 'joke';
  let countText = `${filteredJokes.length} cached ${lbl}${filteredJokes.length!==1?'s':''}`;
  if (apiResults.length) countText += ` + ${apiResults.length} online`;
  $jokeCount.textContent = countText;
}

function applyFilters() {
  const q = $search.value.toLowerCase().trim();
  let src = showingFavourites ? getFavJokes() : allJokes;
  if (activeCategory !== 'All') src = src.filter(j => j.cat === activeCategory);
  if (q) src = src.filter(j => j.text.toLowerCase().includes(q) || j.cat.toLowerCase().includes(q) || (j.setup&&j.setup.toLowerCase().includes(q)) || (j.delivery&&j.delivery.toLowerCase().includes(q)) || (j.source&&j.source.toLowerCase().includes(q)));
  filteredJokes = src;
  renderCategories(); renderJokes();
  try {
    const p = new URLSearchParams();
    if (activeCategory!=='All') p.set('cat',activeCategory);
    if (q) p.set('q',q);
    if (showingFavourites) p.set('favs','1');
    const qs = p.toString();
    history.replaceState(null,'',qs?`?${qs}`:location.pathname);
  } catch {}
}

function debounce(fn,ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a),ms); }; }
function toast(msg) { $toast.textContent=msg; $toast.classList.add('show'); setTimeout(()=>$toast.classList.remove('show'), Math.max(2000, msg.length * 40)); }

$search.addEventListener('input', debounce(() => {
  apiResults = [];
  const q = $search.value.trim();
  $apiSearchBtn.style.display = q.length >= 2 ? '' : 'none';
  applyFilters();
}, 200));

$apiSearchBtn.addEventListener('click', async () => {
  const q = $search.value.trim();
  if (q.length < 2) return;
  $apiSearchBtn.classList.add('loading');
  $apiSearchBtn.textContent = '🌐 Searching…';
  apiResults = await searchAPIJokes(q);
  $apiSearchBtn.classList.remove('loading');
  $apiSearchBtn.textContent = '🌐 Search Online';
  if (!apiResults.length) toast('No online matches — JokeAPI only has ~1,400 jokes. Try simpler terms like "doctor", "bar", "programmer".');
  else toast(`Found ${apiResults.length} online result${apiResults.length!==1?'s':''}`);
  renderJokes();
});

$search.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && $search.value.trim().length >= 2) {
    $apiSearchBtn.click();
  }
});
$cats.addEventListener('click', e => { const p = e.target.closest('.cat-pill'); if(p) { activeCategory=p.dataset.cat; apiResults=[]; applyFilters(); }});
$randomBtn.addEventListener('click', () => {
  showingFavourites=false; $favToggle.classList.remove('active'); activeCategory='All'; $search.value='';
  apiResults=[]; $apiSearchBtn.style.display='none';
  filteredJokes=[allJokes[Math.floor(Math.random()*allJokes.length)]];
  renderCategories(); renderJokes(); $jokeCount.textContent='Random pick'; $endOrnament.style.display='none';
});
$favToggle.addEventListener('click', () => {
  showingFavourites=!showingFavourites; $favToggle.classList.toggle('active',showingFavourites);
  activeCategory='All'; $search.value=''; apiResults=[]; $apiSearchBtn.style.display='none'; applyFilters();
});
$list.addEventListener('click', e => {
  const fb = e.target.closest('.fav-btn');
  if (fb) {
    const id=fb.dataset.id;
    if(favourites.includes(id)) { favourites=favourites.filter(f=>f!==id); fb.classList.remove('faved'); fb.innerHTML='☆ Save'; toast('Removed'); }
    else {
      favourites.push(id);
      // If it's an online result not yet in allJokes, add it so it shows in favourites
      const inAll = allJokes.some(j => jokeId(j) === id);
      if (!inAll) {
        const onlineJoke = apiResults.find(j => jokeId(j) === id);
        if (onlineJoke) allJokes.push({...onlineJoke});
      }
      fb.classList.add('faved'); fb.innerHTML='★ Saved'; toast('Saved to favourites');
    }
    localStorage.setItem('raconteur-favs',JSON.stringify(favourites));
    if(showingFavourites) applyFilters(); return;
  }
  const cb = e.target.closest('.copy-btn');
  if (cb) navigator.clipboard.writeText(cb.dataset.text).then(()=>toast('Copied!')).catch(()=>toast('Could not copy'));
});

const p = new URLSearchParams(location.search);
if(p.get('cat')) activeCategory=p.get('cat');
if(p.get('q')) $search.value=p.get('q');
if(p.get('favs')==='1') { showingFavourites=true; $favToggle.classList.add('active'); }
applyFilters();
loadAPIJokes();
</script>
</body>
</html>
